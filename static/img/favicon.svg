<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Industrial 'P' with Hammer and Sprout elements -->
  <!-- Hammer Handle / Vertical of P -->
  <rect x="30" y="20" width="15" height="60" fill="#003366" />
  
  <!-- Hammer Head / Top of P -->
  <rect x="30" y="20" width="45" height="15" fill="#003366" />
  
  <!-- Right curve of P - styled as industrial block -->
  <path d="M 75 35 L 75 55 L 45 55 L 45 35 Z" fill="#003366" />
  
  <!-- Small Leaf/Sprout at the top left to represent growth/planning -->
  <path d="M 28 20 Q 20 10 32 8 Q 38 12 32 20 Z" fill="#3399ff" />
  
  <!-- Connecting line/stem -->
  <path d="M 30 20 L 32 15" stroke="#3399ff" stroke-width="2" fill="none" />
</svg>
